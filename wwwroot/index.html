<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jojik Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="deco-left">
    <div class="deco-label">JOJIK</div>
    <div class="deco-line"></div>
    <div class="deco-dots">
        <span></span><span></span><span></span>
    </div>
    <div class="deco-square"></div>
    <div class="deco-label">CHAT</div>
    <div class="deco-line"></div>
    <div class="deco-cross"></div>
    <div class="deco-dots">
        <span></span><span></span><span></span>
    </div>
    <div class="deco-label">AI</div>
    <div class="deco-line"></div>
    <div class="deco-square"></div>
</div>

<div class="deco-right">
    <div class="deco-label">ATL</div>
    <div class="deco-line"></div>
    <div class="deco-cross"></div>
    <div class="deco-dots">
        <span></span><span></span><span></span>
    </div>
    <div class="deco-square"></div>
    <div class="deco-label">2026</div>
    <div class="deco-line"></div>
    <div class="deco-dots">
        <span></span><span></span><span></span>
    </div>
    <div class="deco-label">BOT</div>
    <div class="deco-line"></div>
    <div class="deco-cross"></div>
</div>

<div id="app">

    <div id="header">
        <div id="header-left">
            <h1>🍺 JOJIK CHAT</h1>
            <span id="header-sub">AI группового чата</span>
        </div>
        <div id="status-badge">
            <div id="status-dot"></div>
            <span id="status-text">Подключение...</span>
        </div>
    </div>

    <div id="chat-wrapper">
        <div id="empty-state">
            <div class="icon">🍺</div>
            <div>Сообщений пока нет, братан...</div>
        </div>
        <div id="chat"></div>
    </div>

    <div id="input-area">
        <input
                id="msgInput"
                type="text"
                placeholder="Анонимное сообщение в чат..."
                autocomplete="off"
        />
        <button id="sendBtn" onclick="sendAnonymous()">ОТПРАВИТЬ</button>
    </div>

</div>

<script>
    let lastCount = 0;
    let lastLastContent = '';

    async function updateStatus() {
        try {
            const r = await fetch('/api/status');
            const data = await r.json();
            const badge = document.getElementById('status-badge');
            const text = document.getElementById('status-text');

            if (data.status === 'Подключено' || data.status === 'Мок-режим') {
                badge.classList.add('connected');
                text.textContent = data.status;
            } else {
                badge.classList.remove('connected');
                text.textContent = data.status;
            }
        } catch {
            document.getElementById('status-text').textContent = 'Нет связи';
        }
    }

    async function loadHistory() {
        try {
            const r = await fetch('/api/history?t=' + Date.now());
            const messages = await r.json();

            const chat = document.getElementById('chat');
            const empty = document.getElementById('empty-state');

            if (messages.length === 0) {
                empty.style.display = 'flex';
                chat.innerHTML = '';
                lastCount = 0;
                lastLastContent = '';
                return;
            }

            if (messages.length === lastCount &&
                messages[messages.length - 1]?.text === lastLastContent) return;

            lastCount = messages.length;
            lastLastContent = messages[messages.length - 1]?.text ?? '';

            empty.style.display = 'none';
            chat.innerHTML = '';

            for (const msg of messages) {
                const isAnon = msg.senderLogin === 'Cursed';
                const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', {
                    hour: '2-digit', minute: '2-digit'
                });

                const div = document.createElement('div');
                div.className = `message ${isAnon ? 'anon' : 'ai'}`;
                div.innerHTML = `
                    <div class="msg-meta">
                        <span class="msg-author">${isAnon ? 'Курседыш' : msg.senderLogin}</span>
                        <span class="msg-time">${time}</span>
                    </div>
                    <div class="msg-bubble">${escapeHtml(msg.text)}</div>
                `;
                chat.appendChild(div);
            }

            const wrapper = document.getElementById('chat-wrapper');
            wrapper.scrollTop = wrapper.scrollHeight;
        } catch (e) {
            console.error('Ошибка загрузки:', e);
        }
    }

    async function sendAnonymous() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';

        fetch('/api/send-anonymous', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                text: text,
                senderLogin: 'Cursed',
                timestamp: new Date().toISOString(),
                chatId: 0,
                id: '00000000-0000-0000-0000-000000000000'
            })
        });
    }

    function escapeHtml(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    document.getElementById('msgInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') sendAnonymous();
    });

    updateStatus();
    loadHistory();
    setInterval(loadHistory, 1000);
    setInterval(updateStatus, 10000);
</script>
</body>
</html>
